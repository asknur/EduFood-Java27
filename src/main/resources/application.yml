server:
  port: 8080

spring:
  application:
    name: EduFood-java27
  mvc:
    static-path-pattern: /static/**

  datasource:
    url: jdbc:h2:./db/test;AUTO_SERVER=TRUE
    username: root
    password: 1234
    driver-class-name: org.h2.Driver
  #    sql:
  #      init:
  #        mode: always

  liquibase:
    change-log: classpath:/db/changelog/master.yaml


  jpa:
    hibernate:
      ddl-auto: validate

logging:
  file:
    path: logs
  level:
    kg.attractor.edufoodjava27: debug
    com.zaxxer.hikari: error
    org.apache.tomcat: error
    liquibase: error
    root: info
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"